<div class="welcome-container">
  <div class="hero">
    <div class="hero-badge">
      <span class="hero-dot"></span>
      Sistema Activo
    </div>
    <h1 class="hero-title">Sistema de<br><span class="highlight">Indisponibilidad</span></h1>
    <p class="hero-sub">Monitoreo y análisis de disponibilidad de centrales de telecomunicaciones en tiempo real.</p>
    <a mat-flat-button color="primary" routerLink="/dashboard" class="hero-cta">
      <mat-icon>dashboard</mat-icon> Ir al Dashboard
    </a>
  </div>

  <div class="menu-grid">
    @for (item of menu; track item.route) {
      <a class="menu-card" [routerLink]="item.route">
        <div class="card-icon-wrap" [ngClass]="item.color">
          <mat-icon>{{ item.icon }}</mat-icon>
        </div>
        <div class="card-body">
          <div class="card-title">{{ item.label }}</div>
          <div class="card-desc">{{ item.desc }}</div>
        </div>
        <mat-icon class="card-arrow">arrow_forward_ios</mat-icon>
      </a>
    }
  </div>
</div>
